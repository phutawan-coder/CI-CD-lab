name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with: 
        python-version: 3.14

    - run: pip install --no-cache-dir -r requirements.txt

    - run: python -m pytest

    - run: docker build -t ci-cd-lab:${{ github.sha }} .

    - name: Login to Docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Tag image
      run: docker tag ci-cd-lab:${{ github.sha }} phutawan1906/ci-cd-lab:${{ github.sha }}

    - name: Push image
      run: docker push phutawan1906/ci-cd-lab:${{ github.sha }}

    - name: Tag branch
      run: |
        docker tag ci-cd-lab:${{ github.sha }} phutawan1906/ci-cd-lab:${{ github.ref_name }}
        docker push phutawan1906/ci-cd-lab:${{ github.ref_name}}
